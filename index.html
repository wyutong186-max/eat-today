.draw-box {

}

.draw-box.shaking {

}

@keyframes shake {
  0%, 100% { transform: rotate(0deg); }

  40% { transform: rotate(5deg); }

}

}
.result-tag {
  display: inline-block;

  animation: fadeUp 0.5s ease-out 0.1s both;
}

@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  80% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes fadeUp {
  0% { transform: translateY(10px); opacity: 0; }

}

}

  font-size: 16px;
  color: var(--muted);
  font-weight: 500;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* Button */
.btn-draw {
  padding: 16px 56px;
  border-radius: 100px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(255, 123, 123, 0.35);
  transition: all 0.3s;
  letter-spacing: 2px;
  user-select: none;
}
.btn-draw:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(255, 123, 123, 0.45);
}
.btn-draw:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(255, 123, 123, 0.25);
}

  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.reroll-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

}

  background: var(--accent);

}

/* History */
.history-section {
  width: 100%;
}
.history-title {

.confetti-container {
  position: fixed;

  animation: confettiFall 1.5s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-60px) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* Responsive */
@media (max-width: 400px) {
  .draw-box { padding: 30px 18px; min-height: 220px; }

  .header .icon { font-size: 44px; }

<body>

  <!-- Category tabs -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-cat="all">全部</button>
    <button class="tab" data-cat="中餐">🥢 中餐</button>
    <button class="tab" data-cat="快餐">🍔 快餐</button>
    <button class="tab" data-cat="面食">🍝 面食</button>

  <!-- Draw button -->
  <button class="btn-draw" id="btnDraw" onclick="doDraw()">🎯 抽 一 签</button>

  <!-- Reroll row -->
  <div class="reroll-row" id="rerollRow" style="display:none;">
    <button class="btn-reroll" onclick="doDraw()">🔄 再抽一次</button>
    <button class="btn-reroll" onclick="resetDraw()">🏠 换个分类</button>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none;">
    <div class="history-title">📋 最近抽到的</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
// ==================== Food Database ====================
const foodDB = [

  { name: '鱼香肉丝', emoji: '🐟', cat: '中餐', color: '#e67e22' },
  { name: '水煮鱼', emoji: '🌶️', cat: '中餐', color: '#c0392b' },
  { name: '番茄炒蛋', emoji: '🍅', cat: '中餐', color: '#e74c3c' },
  { name: '酸菜鱼', emoji: '🐠', cat: '中餐', color: '#d35400' },
  { name: '干锅花菜', emoji: '🥦', cat: '中餐', color: '#27ae60' },
  { name: '地三鲜', emoji: '🍆', cat: '中餐', color: '#8e44ad' },
  { name: '京酱肉丝', emoji: '🥢', cat: '中餐', color: '#c0392b' },

  // 快餐
  { name: '炸鸡汉堡', emoji: '🍔', cat: '快餐', color: '#f39c12' },
  { name: '薯条', emoji: '🍟', cat: '快餐', color: '#e67e22' },
  { name: '披萨', emoji: '🍕', cat: '快餐', color: '#e74c3c' },
  { name: '热狗', emoji: '🌭', cat: '快餐', color: '#f39c12' },
  { name: '炸鸡翅', emoji: '🍗', cat: '快餐', color: '#d35400' },
  { name: '鸡肉卷', emoji: '🌯', cat: '快餐', color: '#e67e22' },
  { name: '三明治', emoji: '🥪', cat: '快餐', color: '#f39c12' },
  { name: '塔可', emoji: '🌮', cat: '快餐', color: '#27ae60' },

  // 面食
  { name: '兰州拉面', emoji: '🍜', cat: '面食', color: '#e67e22' },
  { name: '炸酱面', emoji: '🥡', cat: '面食', color: '#795548' },
  { name: '重庆小面', emoji: '🌶️', cat: '面食', color: '#c0392b' },
  { name: '意大利面', emoji: '🍝', cat: '面食', color: '#e74c3c' },
  { name: '刀削面', emoji: '🔪', cat: '面食', color: '#d35400' },
  { name: '馄饨', emoji: '🥟', cat: '面食', color: '#f39c12' },
  { name: '饺子', emoji: '🥟', cat: '面食', color: '#e67e22' },
  { name: '葱油拌面', emoji: '🧅', cat: '面食', color: '#27ae60' },
  { name: '螺蛳粉', emoji: '🐌', cat: '面食', color: '#8e44ad' },
  { name: '热干面', emoji: '🍜', cat: '面食', color: '#e67e22' },

  // 小吃
  { name: '麻辣烫', emoji: '🍲', cat: '小吃', color: '#c0392b' },
  { name: '煎饼果子', emoji: '🥞', cat: '小吃', color: '#f39c12' },
  { name: '肉夹馍', emoji: '🥙', cat: '小吃', color: '#d35400' },
  { name: '生煎包', emoji: '🧆', cat: '小吃', color: '#e67e22' },
  { name: '烤冷面', emoji: '🔥', cat: '小吃', color: '#e74c3c' },
  { name: '臭豆腐', emoji: '🧀', cat: '小吃', color: '#795548' },
  { name: '凉皮', emoji: '🍝', cat: '小吃', color: '#27ae60' },
  { name: '关东煮', emoji: '🍢', cat: '小吃', color: '#f39c12' },
  { name: '手抓饼', emoji: '🫓', cat: '小吃', color: '#e67e22' },

  // 日韩
  { name: '寿司', emoji: '🍣', cat: '日韩', color: '#e74c3c' },
  { name: '拉面', emoji: '🍜', cat: '日韩', color: '#f39c12' },
  { name: '石锅拌饭', emoji: '🍚', cat: '日韩', color: '#d35400' },
  { name: '韩式炸鸡', emoji: '🍗', cat: '日韩', color: '#c0392b' },
  { name: '天妇罗', emoji: '🍤', cat: '日韩', color: '#e67e22' },
  { name: '烤肉', emoji: '🥓', cat: '日韩', color: '#e74c3c' },
  { name: '鳗鱼饭', emoji: '🐍', cat: '日韩', color: '#795548' },
  { name: '冷面', emoji: '❄️', cat: '日韩', color: '#3498db' },

  // 西餐
  { name: '牛排', emoji: '🥩', cat: '西餐', color: '#c0392b' },
  { name: '沙拉', emoji: '🥗', cat: '西餐', color: '#27ae60' },
  { name: '意面', emoji: '🍝', cat: '西餐', color: '#e74c3c' },
  { name: '烤鸡', emoji: '🍗', cat: '西餐', color: '#d35400' },
  { name: '法式面包', emoji: '🥖', cat: '西餐', color: '#f39c12' },
  { name: '焗饭', emoji: '🧀', cat: '西餐', color: '#e67e22' },
  { name: '海鲜浓汤', emoji: '🦞', cat: '西餐', color: '#e74c3c' },
];

let currentCat = 'all';
let currentResult = null;
let history = [];
let isDrawing = false;

// ==================== Tab Switching ====================
document.getElementById('tabs').addEventListener('click', function(e) {
  if (e.target.classList.contains('tab')) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    currentCat = e.target.dataset.cat;
    resetDraw();
  }
});

// ==================== Draw ====================
function doDraw() {
  if (isDrawing) return;
  isDrawing = true;

  const btn = document.getElementById('btnDraw');
  const box = document.getElementById('drawBox');
  btn.disabled = true;

  // Filter food
  const pool = currentCat === 'all'
    ? foodDB
    : foodDB.filter(f => f.cat === currentCat);

  if (pool.length === 0) return;

  // Shake animation
  box.classList.add('shaking');
  btn.textContent = '🎰 抽签中...';

  // Rapid cycling during shake
  let cycleCount = 0;
  const maxCycles = 12;
  const cycleInterval = setInterval(() => {
    const random = pool[Math.floor(Math.random() * pool.length)];
    box.innerHTML = `
      <div class="result-emoji" style="opacity:0.6;">${random.emoji}</div>
      <div class="result-name" style="opacity:0.6;font-size:24px;">${random.name}</div>
    `;
    cycleCount++;
    if (cycleCount >= maxCycles) {
      clearInterval(cycleInterval);
      finalizeResult(pool);
    }
  }, 80);

  setTimeout(() => box.classList.remove('shaking'), 500);
}

function finalizeResult(pool) {
  const result = pool[Math.floor(Math.random() * pool.length)];
  currentResult = result;

  const box = document.getElementById('drawBox');
  box.innerHTML = `
    <div class="result-emoji">${result.emoji}</div>
    <div class="result-name">${result.name}</div>
    <span class="result-tag" style="background:${result.color};">${result.cat}</span>
  `;

  // Add to history
  history.unshift(result);
  if (history.length > 10) history.pop();
  renderHistory();

  // Show reroll & history
  document.getElementById('rerollRow').style.display = 'flex';
  document.getElementById('historySection').style.display = 'block';
  document.getElementById('btnDraw').style.display = 'none';

  // Confetti
  spawnConfetti();

  isDrawing = false;
  document.getElementById('btnDraw').disabled = false;
  document.getElementById('btnDraw').textContent = '🎯 抽 一 签';
}

function resetDraw() {
  currentResult = null;
  const box = document.getElementById('drawBox');
  box.innerHTML = `
    <div class="idle-icon">🥣</div>
    <div class="idle-text">点击下方按钮开始抽签</div>
  `;
  document.getElementById('rerollRow').style.display = 'none';
  document.getElementById('btnDraw').style.display = '';
}

// ==================== History ====================
function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = history.map((f, i) =>
    `<span class="history-item" style="animation-delay:${i * 0.05}s;">
      ${f.emoji} ${f.name}
    </span>`
  ).join('');
}

// ==================== Confetti ====================
function spawnConfetti() {
  const container = document.getElementById('confetti');
  const emojis = ['🎉', '✨', '🌟', '💫', '🎊', '🎀', '🌸', '🍀', '💖', '⭐'];
  const frag = document.createDocumentFragment();

  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('span');
    piece.className = 'confetti-piece';
    piece.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    piece.style.left = Math.random() * 100 + '%';
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.animationDuration = (1.2 + Math.random() * 1.5) + 's';
    piece.style.fontSize = (18 + Math.random() * 20) + 'px';
    frag.appendChild(piece);
  }

  container.appendChild(frag);

  setTimeout(() => {
    container.innerHTML = '';
  }, 2500);
}

// ==================== Keyboard shortcut ====================
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' && !isDrawing) {
    e.preventDefault();
    doDraw();
  }
});
</script>
